<div
  id="viewer-inner"
  class="grid grid-cols-[repeat(auto-fill,minmax(130px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(160px,1fr))] gap-3 sm:gap-6 w-full"
>
  <!-- File header -->
  <div class="col-span-full text-sm text-gray-400 mb-2 mt-6 pt-4 border-t border-gray-800 flex items-center gap-2 document-separator" data-pdf-id="{{ pdf_id }}">
    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <span class="text-gray-300 font-medium">{{ filename }}</span>
    <span class="text-gray-600">· {{ page_count }} sayfa</span>
    <input type="checkbox" class="batch-select-checkbox w-4 h-4 accent-blue-500 cursor-pointer" onclick="toggleBatchSelection(this, '{{ pdf_id }}')" title="Bu belgenin tüm sayfalarını seç">
  </div>

  <!-- Page cards -->
  {% for i in range(page_count) %}
  <div
    id="page-card-{{ pdf_id }}-{{ i }}"
    class="page-card"
    data-pdf-id="{{ pdf_id }}"
    data-page-index="{{ i }}"
    title="Sayfa {{ i + 1 }}"
    onclick="handleCardBodyClick(event)"
    oncontextmenu="openCardContextMenu(event, this)"
  >
    <!-- Select checkbox: floats over the top-right corner of the card, not in the strip. -->
    <div class="page-select-checkbox-wrap">
      <input type="checkbox" class="page-select-checkbox" onclick="event.stopPropagation(); applyPageSelection(this, event)" title="Bu sayfayı seç">
    </div>

    <!-- Top Bar: pure click area — drag handle and "Aç" (preview) are the only
         things that do anything here. Rotate lives in the right-click menu now. -->
    <div class="card-top-bar">
      <div class="drag-handle" title="Sıralamak için sürükleyin">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/></svg>
      </div>
      <div class="page-number-small">{{ i + 1 }}</div>

      <button class="open-preview-btn" onclick="event.stopPropagation(); showPreview(this.closest('.page-card'))" title="Önizle">Aç</button>
    </div>

    <canvas
      class="page-img"
      data-pdf-id="{{ pdf_id }}"
      data-page-index="{{ i }}"
      aria-label="Sayfa {{ i + 1 }}"
    ></canvas>
  </div>
  {% endfor %}
</div>
