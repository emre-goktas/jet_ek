{#
  Partial: pdf_item.html
  Component added to the left panel for each generated PDF.
  Jinja2 variables: file_id, filename, label
#}
<div class="pdf-item">
  <div class="flex items-start gap-2">
    <svg class="w-4 h-4 text-blue-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-medium text-gray-200 truncate" title="{{ filename }}">{{ filename }}</p>
      <p class="text-xs text-gray-500 mt-0.5">{{ label }}</p>
    </div>
  </div>
  <div class="flex items-center gap-2 mt-2">
    <button
      data-file-id="{{ file_id }}"
      onclick="downloadSingleFile('{{ file_id }}', this)"
      class="download-btn flex-1 text-center"
    >
      ↓ Download
    </button>
    <button
      onclick="openRenameModal('{{ file_id }}', '{{ filename }}')"
      class="p-2 text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded transition-colors"
      title="Rename"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
      </svg>
    </button>
    <button
      onclick="this.closest('li').remove(); updateBulkDownloadVisibility();"
      class="p-2 text-gray-400 hover:text-red-400 bg-gray-800 hover:bg-gray-700 rounded transition-colors"
      title="Delete"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
