<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JETEK</title>
  <link rel="icon" type="image/jpeg" href="/static/icon.jpg" />
  <meta name="description"
    content="Professional PDF tool to extract, rotate, and optimize pages with advanced text recognition and cleanup." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css?v=4" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <!-- SortableJS script'ini ekle -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

  <!-- HEADER -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-3 shrink-0 relative overflow-hidden">
    <!-- Subtle speed lines background in header -->
    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(59,130,246,0.3) 10px, rgba(59,130,246,0.3) 12px);"></div>
    
    <div class="relative flex items-center justify-center bg-gradient-to-br from-blue-500 to-cyan-400 rounded-lg p-1.5 shadow-[0_0_15px_rgba(34,211,238,0.4)]">
      <svg class="w-5 h-5 text-gray-900 translate-x-0.5 -translate-y-0.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    </div>
    <h1 class="text-2xl font-black tracking-widest italic flex items-center relative z-10 drop-shadow-md">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-blue-600">JET</span>
      <span class="text-gray-100">EK</span>
    </h1>
  </header>

  <!-- MAIN: Sol Panel + PDF Viewer -->
  <main class="flex flex-1 overflow-hidden">

    <!-- LEFT PANEL: Generated PDFs -->
    <aside class="w-64 shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Generated PDFs</h2>
      </div>
      <ul id="output-list" class="flex-1 overflow-y-auto p-3 space-y-2" hx-swap-oob="true">
        <li id="output-empty" class="text-xs text-gray-600 italic text-center mt-8">
          No PDFs generated yet.
        </li>
      </ul>
      <!-- Bulk Download Container -->
      <div id="bulk-download-container" class="hidden p-3 border-t border-gray-800 bg-gray-900 space-y-2">

        <button id="btn-download-all" 
          class="w-full py-2 text-xs font-semibold bg-blue-600 hover:bg-blue-500 text-white rounded-lg border border-blue-500 transition-all duration-150 flex items-center justify-center gap-1.5 shadow-lg shadow-blue-500/20 cursor-pointer" 
          onclick="downloadAllAsZip()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download Only
        </button>
        <button id="btn-download-numbered" 
          class="w-full py-2 text-xs font-semibold bg-blue-600 hover:bg-blue-500 text-white rounded-lg border border-blue-500 transition-all duration-150 flex items-center justify-center gap-1.5 shadow-lg shadow-blue-500/20 cursor-pointer" 
          onclick="downloadAllNumberedAsZip()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download & Add Annex Numbers
        </button>
      </div>
    </aside>

    <!-- PDF VIEWER -->
    <section class="flex-1 flex flex-col overflow-hidden">

      <!-- Toolbar -->
      <div id="toolbar" class="hidden bg-gray-900 border-b border-gray-800 px-5 py-2 flex items-center gap-3 shrink-0">
        <span id="selection-info" class="text-sm text-gray-400 flex-1">
          Click pages to select.
        </span>

        <div class="flex items-center gap-2">
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="selectAllPages()">
            Select All
          </button>
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="clearSelection()">
            Clear Selection
          </button>
          <button id="btn-delete-selected"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-red-500 rounded border border-gray-700 transition-colors"
            onclick="deleteSelectedPages()">
            Delete Selected
          </button>
          <button id="btn-restore-all"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-yellow-500 rounded border border-gray-700 transition-colors"
            onclick="restoreAllPages()">
            Restore All
          </button>
        </div>

        <div class="h-6 w-px bg-gray-800 mx-1"></div>

        <button id="btn-extract" class="action-btn bg-blue-600 hover:bg-blue-500 text-white border-blue-500"
          onclick="doExtract()" title="Extract Selected Pages">
          ✂ Extract
        </button>
      </div>

      <!-- Page list -->
      <div id="viewer" class="flex-1 overflow-y-auto px-6 py-4">
        <div id="upload-hint" class="flex flex-col items-center justify-center h-full gap-4 text-gray-600">
          <svg class="w-20 h-20" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          <p class="text-lg">Upload a PDF below</p>
        </div>
      </div>
    </section>
  </main>

  <!-- UPLOAD AREA -->
  <footer class="bg-gray-900 border-t border-gray-800 px-6 py-4 shrink-0">
    <div id="drop-zone" class="relative border-2 border-dashed border-gray-700 rounded-xl p-5 text-center
             hover:border-blue-500 transition-colors duration-200 overflow-hidden cursor-pointer"
      ondragover="event.preventDefault(); this.classList.add('border-blue-400','bg-blue-950')"
      ondragleave="this.classList.remove('border-blue-400','bg-blue-950')"
      ondrop="handleDrop(event)">
      
      <input id="file-input" type="file" accept=".pdf,.tiff,.tif,.jpeg,.jpg,.png" multiple
        class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"
        onchange="uploadFile(this)" title="Choose files or drag them here" />

      <p class="text-sm text-gray-400 pointer-events-none relative z-0">
        <span class="text-blue-400 font-semibold">Choose file (PDF, Tiff, Jpeg, Png)</span> or drag it here
      </p>
    </div>
    <div id="upload-status" class="text-xs text-center mt-2 text-gray-500 hidden"></div>

  </footer>

  <!-- PREVIEW MODAL -->
  <div id="preview-modal" class="modal-overlay" onclick="closePreview()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closePreview()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <img id="preview-img" src="" alt="Preview">
    </div>
  </div>

  <!-- NAMING MODAL -->
  <div id="naming-modal" class="modal-overlay" onclick="closeNamingModal()">
    <div class="modal-content bg-gray-900 border border-gray-800 rounded-2xl p-0 flex flex-col shadow-2xl overflow-hidden"
      style="max-width: 40rem; width: 100%; height: 90vh;" onclick="event.stopPropagation()">
      
      <!-- Top: Preview (Large) -->
      <div class="w-full flex-1 bg-gray-950 p-4 flex flex-col border-b border-gray-800 overflow-hidden relative">
          <div class="flex justify-between items-center mb-2 z-10">
              <p id="preview-modal-title" class="text-xs text-gray-400 uppercase tracking-widest font-semibold">First Page Preview</p>
              <div class="flex gap-2">
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs font-bold" onclick="zoomPreview(0.2)">+</button>
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs font-bold" onclick="zoomPreview(-0.2)">-</button>
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs" onclick="resetZoom()">Reset</button>
              </div>
          </div>
          <div class="flex-1 overflow-auto bg-gray-900 rounded-lg border border-gray-800 relative flex items-center justify-center cursor-move" id="preview-scroll-container">
              <img id="naming-preview-img" src="" draggable="false" class="max-w-full max-h-full object-contain drop-shadow-md transition-transform origin-center" style="transform: scale(1);">
          </div>
      </div>

      <!-- Bottom: Form -->
      <div class="w-full px-4 py-6 flex flex-col justify-center shrink-0">
          <div class="mb-4 w-full flex flex-col gap-3">
            <div class="flex items-center justify-between px-2" id="preview-nav-container" style="display: none;">
                <button type="button" class="text-gray-400 hover:text-white px-2 cursor-pointer focus:outline-none" onclick="previewPrevPage()"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg></button>
                <div class="flex items-center gap-2 text-xs text-gray-400 font-medium">
                    <span>Page</span>
                    <input type="number" id="preview-page-input" class="bg-gray-800 border border-gray-700 text-white rounded px-2 py-1 w-12 text-center focus:outline-none" onchange="previewGoToPage()">
                    <span>of <span id="preview-total-pages">1</span></span>
                </div>
                <button type="button" class="text-gray-400 hover:text-white px-2 cursor-pointer focus:outline-none" onclick="previewNextPage()"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg></button>
            </div>
            <div class="w-full relative">
                <textarea id="custom-filename" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-6 py-4 text-white text-sm font-medium focus:outline-none focus:border-blue-500 transition-colors shadow-inner resize-none" placeholder="belge ismini buraya yazınız" autocomplete="off"></textarea>
            </div>
          </div>
          <div class="flex justify-center gap-4 w-full mt-2">
            <button
              class="flex-1 px-5 py-3 text-base bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl border border-gray-700 transition-colors font-medium"
              onclick="closeNamingModal()">
              Cancel
            </button>
            <button
              class="flex-1 px-5 py-3 text-base bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition-colors"
              onclick="proceedToExtract()">
              Next
            </button>
          </div>
      </div>

    </div>
  </div>

  <script>
    let batchPreviewItems = [];
    let currentBatchPreviewIndex = 0;
    
    let selectedPages = new Set();
    let selectionHistory = []; // Track selection actions for undo
    let deletedPages = new Set();
    let lastClickedCardId = null;
    let pageRotations = {};
    let sortableInstance = null;
    let currentCustomName = '';
    let fileCounter = 1;
    let pendingFiles = [];


    function handleDrop(e) {
      console.log('DEBUG: handleDrop called', e);
      e.preventDefault();
      const zone = document.getElementById('drop-zone');
      if (zone) zone.classList.remove('border-blue-400', 'bg-blue-950');
      const files = Array.from(e.dataTransfer.files);
      console.log('DEBUG: handleDrop files:', files);
      if (files.length > 0) {
        processFiles(files);
      }
    }

    function uploadFile(input) {
      console.log('DEBUG: uploadFile called, input value:', input.value);
      const zone = document.getElementById('drop-zone');
      if (zone) zone.classList.remove('border-blue-400', 'bg-blue-950');
      const files = Array.from(input.files);
      console.log('DEBUG: uploadFile files:', files);
      if (files.length > 0) {
        processFiles(files);
      }
      console.log('DEBUG: resetting input.value to empty string');
      input.value = ""; // reset
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const viewer = document.getElementById('viewer');
      viewer.addEventListener('dragover', (e) => {
        e.preventDefault();
        viewer.classList.add('bg-gray-800', 'bg-opacity-50');
      });
      viewer.addEventListener('dragleave', (e) => {
        viewer.classList.remove('bg-gray-800', 'bg-opacity-50');
      });
      viewer.addEventListener('drop', (e) => {
        e.preventDefault();
        viewer.classList.remove('bg-gray-800', 'bg-opacity-50');
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) {
          processFiles(files);
        }
      });
      
      const outputList = document.getElementById('output-list');
      if (outputList) {
        new Sortable(outputList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          forceFallback: true,
          fallbackClass: 'sortable-drag',
          filter: 'button, a',
          preventOnFilter: false
        });
      }

      updateBulkDownloadVisibility();
    });

    async function processFiles(files) {
      const validExts = ['.pdf', '.tiff', '.tif', '.jpeg', '.jpg', '.png'];
      let current = 0;
      let total = files.length;
      let skipped = 0;
      let failed = 0;
      let success = 0;
      
      for (let file of files) {
        current++;
        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
        if (!validExts.includes(ext)) {
          skipped++;
          continue;
        }
        showStatus(`⏳ Uploading ${file.name} (${current}/${total})...`, 'text-gray-400');
        const isOk = await sendFile(file);
        if (isOk) {
            success++;
        } else {
            failed++;
        }
      }
      
      if (skipped > 0 || failed > 0) {
        let msgs = [];
        if (success > 0) msgs.push(`${success} uploaded`);
        if (skipped > 0) msgs.push(`${skipped} skipped (unsupported)`);
        if (failed > 0) msgs.push(`${failed} failed`);
        showStatus(`⚠ ${msgs.join(', ')}.`, 'text-yellow-400');
      } else if (success > 0) {
        showStatus(`✓ All ${success} uploads completed.`, 'text-green-400');
      } else {
        showStatus(`⚠ No valid files to upload.`, 'text-yellow-400');
      }
    }

    async function sendFile(file) {
      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json();
          showStatus('✗ Error: ' + err.detail, 'text-red-400');
          return false;
        }

        const html = await res.text();
        const viewer = document.getElementById('viewer');
        
        let inner = document.getElementById('viewer-inner');
        if (!inner) {
          viewer.innerHTML = html;
        } else {
          // Robustly append elements
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = html.trim();
          
          // find the viewer-inner or assume tempDiv's first child
          const newInner = tempDiv.querySelector('#viewer-inner') || tempDiv.firstElementChild;
          if (newInner) {
            // Append all children to existing grid
            while (newInner.firstChild) {
              inner.appendChild(newInner.firstChild);
            }
          }
        }

        if (typeof htmx !== 'undefined') {
          htmx.process(document.getElementById('viewer'));
        }

        document.getElementById('toolbar').classList.remove('hidden');
        document.getElementById('upload-hint')?.remove();

        inner = document.getElementById('viewer-inner');

        if (sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(inner, {
          multiDrag: true,
          selectedClass: 'selected',
          animation: 150,
          handle: '.drag-handle',
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          scroll: viewer,
          scrollSensitivity: 80,
          scrollSpeed: 20
        });
        return true;
      } catch (err) {
        showStatus('✗ Connection error.', 'text-red-400');
        return false;
      }
    }

    function showStatus(msg, cls) {
      const el = document.getElementById('upload-status');
      if (!el) return;
      el.textContent = msg;
      el.className = `text-xs text-center mt-2 ${cls}`;
      el.classList.remove('hidden');
    }

    function selectPage(card, event) {
      if (event.target.closest('.drag-handle') || event.target.closest('.small-rotate-btn') || event.target.closest('.delete-btn-inline')) return;
      
      const cid = card.id;
      if (deletedPages.has(cid)) return;

      const isShift = event.shiftKey;
      const isMeta = event.ctrlKey || event.metaKey;
      
      const added = [];
      const removed = [];
      const prevAnchor = lastClickedCardId;

      if (!isShift && !isMeta) {
        showPreview(card);
      } else if (isShift) {
        const cards = Array.from(document.querySelectorAll('.page-card'));
        const idx1 = lastClickedCardId ? cards.findIndex(c => c.id === lastClickedCardId) : -1;
        const idx2 = cards.findIndex(c => c === card);
        if (idx1 !== -1 && idx2 !== -1) {
          const start = Math.min(idx1, idx2);
          const end = Math.max(idx1, idx2);
          for (let i = start; i <= end; i++) {
            const currentId = cards[i].id;
            if (!selectedPages.has(currentId)) {
              selectedPages.add(currentId);
              added.push(currentId);
            }
          }
        } else {
          if (!selectedPages.has(cid)) {
            selectedPages.add(cid);
            added.push(cid);
          }
        }
      } else if (isMeta) {
        if (selectedPages.has(cid)) {
          selectedPages.delete(cid);
          removed.push(cid);
        } else {
          selectedPages.add(cid);
          added.push(cid);
        }
      }
      
      if (isShift || isMeta) {
        if (added.length > 0 || removed.length > 0) {
          selectionHistory.push({ added, removed, prevAnchor });
        }
        lastClickedCardId = cid;
      }
      
      updateHighlight();
      updateSelectionInfo();
    }

    function selectAllPages() {
      document.querySelectorAll('.page-card').forEach(c => {
        if (!deletedPages.has(c.id)) selectedPages.add(c.id);
      });
      updateHighlight();
      updateSelectionInfo();
    }

    function clearSelection() {
      selectedPages.clear();
      selectionHistory = [];
      lastClickedCardId = null;
      updateHighlight();
      updateSelectionInfo();
    }

    function updateHighlight() {
      document.querySelectorAll('.page-card').forEach(card => {
        const shouldBeSelected = selectedPages.has(card.id);
        card.classList.toggle('selected', shouldBeSelected);

        try {
          if (typeof Sortable !== 'undefined' && Sortable.utils && Sortable.utils.select) {
            if (shouldBeSelected) Sortable.utils.select(card);
            else Sortable.utils.deselect(card);
          }
        } catch (e) { }
      });
    }

    function updateSelectionInfo() {
      const info = document.getElementById('selection-info');
      if(info) info.textContent = selectedPages.size === 0 ? 'Select pages' : `${selectedPages.size} pages selected.`;

      const btnDeleteSelected = document.getElementById('btn-delete-selected');
      if (btnDeleteSelected) {
        btnDeleteSelected.classList.toggle('hidden', selectedPages.size === 0);
      }

      const btnRestoreAll = document.getElementById('btn-restore-all');
      if (btnRestoreAll) {
        btnRestoreAll.classList.toggle('hidden', deletedPages.size === 0);
      }
    }

    function deleteSelectedPages() {
      selectedPages.forEach(cid => {
        deletedPages.add(cid);
        const card = document.getElementById(cid);
        if (card) {
          card.classList.add('deleted-page');
          card.classList.remove('selected');
        }
      });
      selectedPages.clear();
      updateSelectionInfo();
    }

    function deletePage(event, card) {
      event.stopPropagation();
      deletedPages.add(card.id);
      card.classList.add('deleted-page');
      card.classList.remove('selected');
      selectedPages.delete(card.id);
      updateSelectionInfo();
    }

    function restorePage(event, card) {
      event.stopPropagation();
      deletedPages.delete(card.id);
      card.classList.remove('deleted-page');
      updateSelectionInfo();
    }

    function restoreAllPages() {
      deletedPages.clear();
      document.querySelectorAll('.page-card').forEach(card => card.classList.remove('deleted-page'));
      updateSelectionInfo();
    }

    function rotateSinglePage(event, card, direction) {
      event.stopPropagation();
      const angle = direction === 'left' ? -90 : 90;
      let currentRotation = pageRotations[card.id] || 0;
      currentRotation = (currentRotation + angle) % 360;
      if (currentRotation < 0) currentRotation += 360;
      pageRotations[card.id] = currentRotation;
      const img = card.querySelector('.page-img');
      if (img) img.style.transform = `rotate(${currentRotation}deg)`;
    }

    function closeNamingModal() {
      const m = document.getElementById('naming-modal');
      if(m) m.classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    function doExtract() {
      if (selectedPages.size === 0) return;
      document.getElementById('custom-filename').value = '';
      
      const cardsInOrder = Array.from(document.querySelectorAll('.page-card'));
      batchPreviewItems = [];
      for (let card of cardsInOrder) {
        if (selectedPages.has(card.id) && !deletedPages.has(card.id)) {
           const img = card.querySelector('.page-img');
           if (img) {
               batchPreviewItems.push({
                   src: img.src,
                   rotation: pageRotations[card.id] || 0
               });
           }
        }
      }
      
      if (batchPreviewItems.length === 0) return;
      currentBatchPreviewIndex = 0;
      updateBatchPreviewUI();

      document.getElementById('naming-modal').classList.add('active');
      document.body.classList.add('modal-open');
    }

    function updateBatchPreviewUI() {
        if (batchPreviewItems.length === 0) return;
        const item = batchPreviewItems[currentBatchPreviewIndex];
        
        const previewImg = document.getElementById('naming-preview-img');
        if (previewImg) {
            previewImg.src = item.src;
            previewImg.dataset.rotation = item.rotation;
            if (typeof resetZoom === 'function') resetZoom();
        }
        
        const titleEl = document.getElementById('preview-modal-title');
        const navContainer = document.getElementById('preview-nav-container');
        if (batchPreviewItems.length > 1) {
            if (titleEl) titleEl.textContent = "Batch Preview";
            if (navContainer) {
                navContainer.style.display = "flex";
                document.getElementById('preview-page-input').value = currentBatchPreviewIndex + 1;
                document.getElementById('preview-total-pages').textContent = batchPreviewItems.length;
            }
        } else {
            if (titleEl) titleEl.textContent = "First Page Preview";
            if (navContainer) navContainer.style.display = "none";
        }
    }

    function previewPrevPage() {
        if (batchPreviewItems.length === 0) return;
        currentBatchPreviewIndex--;
        if (currentBatchPreviewIndex < 0) {
            currentBatchPreviewIndex = batchPreviewItems.length - 1;
        }
        updateBatchPreviewUI();
    }
    
    function previewNextPage() {
        if (batchPreviewItems.length === 0) return;
        currentBatchPreviewIndex++;
        if (currentBatchPreviewIndex >= batchPreviewItems.length) {
            currentBatchPreviewIndex = 0;
        }
        updateBatchPreviewUI();
    }
    
    function previewGoToPage() {
        const input = document.getElementById('preview-page-input');
        let val = parseInt(input.value);
        if (isNaN(val)) val = 1;
        
        if (val < 1) {
            val = batchPreviewItems.length;
        } else if (val > batchPreviewItems.length) {
            val = 1;
        }
        
        currentBatchPreviewIndex = val - 1;
        updateBatchPreviewUI();
    }

    let renamingFileId = null;

    function proceedToExtract() {
      let input = document.getElementById('custom-filename').value.replace(/[\r\n]+/g, ' ').trim();
      currentCustomName = input || (renamingFileId ? 'renamed_file' : 'extracted'); 
      
      closeNamingModal();
      
      if (renamingFileId) {
        submitRename(renamingFileId, currentCustomName);
        renamingFileId = null;
      } else {
        confirmExtract(true);
      }
    }

    function openRenameModal(fileId, currentName) {
      renamingFileId = fileId;
      
      const previewImg = document.getElementById('naming-preview-img');
      previewImg.src = '/page/' + fileId + '/0';
      resetZoom();
      
      const m = document.getElementById('naming-modal');
      if (m) m.classList.add('active');
      document.body.classList.add('modal-open');
      
      const input = document.getElementById('custom-filename');
      let baseName = currentName.replace(/\.pdf$/i, '');
      input.value = baseName;
      input.focus();
    }

    async function submitRename(fileId, newName) {
      const res = await postAction('/rename/' + fileId, { custom_name: newName });
      if (res) {
        const link = document.querySelector(`.download-btn[data-file-id='${fileId}']`);
        if (link) {
          const li = link.closest('li');
          if (li) {
            li.innerHTML = res;
          }
        }
      }
    }

    function appendLoadingToOutputList(taskId, filename) {
      const list = document.getElementById('output-list');
      const empty = document.getElementById('output-empty');
      if (empty) empty.remove();
      
      const wrapper = document.createElement('li');
      wrapper.id = `loading-task-${taskId}`;
      wrapper.innerHTML = `
        <div class="pdf-item opacity-75 border border-dashed border-gray-800 p-2.5 rounded-lg bg-gray-900/50 flex flex-col gap-2">
          <div class="flex items-start gap-2">
            <svg class="animate-spin w-4 h-4 text-blue-500 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            <div class="flex-1 min-w-0">
              <p class="text-xs font-medium text-gray-400 truncate" title="${filename}">${filename}</p>
              <p class="text-[10px] text-blue-400 font-semibold animate-pulse mt-0.5">Processing...</p>
            </div>
          </div>
          <div class="w-full bg-gray-850 rounded-full h-1 overflow-hidden">
            <div class="bg-blue-500 h-1 rounded-full w-2/3 animate-pulse"></div>
          </div>
        </div>
      `;
      list.appendChild(wrapper);
      updateBulkDownloadVisibility();
    }

    function replaceLoadingWithOutput(taskId, html) {
      const loader = document.getElementById(`loading-task-${taskId}`);
      if (loader) {
        loader.removeAttribute('id');
        loader.innerHTML = html;
        updateBulkDownloadVisibility();
      }
    }

    function handleLoadingFailure(taskId, errorMsg) {
      const loader = document.getElementById(`loading-task-${taskId}`);
      if (loader) {
        loader.innerHTML = `
          <div class="pdf-item border border-red-950/50 p-2.5 rounded-lg bg-red-950/20 flex flex-col gap-1.5">
            <div class="flex items-start gap-2">
              <svg class="w-4 h-4 text-red-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <div class="flex-1 min-w-0">
                <p class="text-xs font-medium text-red-400 truncate">Extraction Failed</p>
                <p class="text-[10px] text-red-500 mt-0.5 line-clamp-2" title="${errorMsg}">${errorMsg}</p>
              </div>
            </div>
            <button class="text-[10px] text-gray-500 hover:text-gray-400 self-end uppercase font-semibold" onclick="this.closest('li').remove(); updateBulkDownloadVisibility();">Dismiss</button>
          </div>
        `;
        updateBulkDownloadVisibility();
      }
    }

    async function confirmExtract() {
      if (selectedPages.size === 0) return;

      const cardsInOrder = Array.from(document.querySelectorAll('.page-card'));
      const extractionList = [];
      
      cardsInOrder.forEach(card => {
        if (selectedPages.has(card.id) && !deletedPages.has(card.id)) {
          extractionList.push({
             pdf_id: card.dataset.pdfId,
             page_idx: parseInt(card.dataset.pageIndex),
             rotation: pageRotations[card.id] || 0
          });
        }
      });
      
      if(extractionList.length === 0) {
          return;
      }

      // Generate temporary display filename
      let displayFilename = '';
      if (currentCustomName) {
        displayFilename = `${currentCustomName}.pdf`;
      } else {
        const count = extractionList.length;
        const label = count === 1 ? `page_${extractionList[0].page_idx + 1}` : `${count}_pages`;
        displayFilename = `extracted_${label}.pdf`;
      }

      // Generate a temp UI ID for tracking until response
      const tempUiId = 'temp-' + Math.random().toString(36).substring(2, 9);
      appendLoadingToOutputList(tempUiId, displayFilename);
      clearSelection();

      const res = await postAction('/extract', {
        pages: extractionList,
        custom_name: currentCustomName,
        file_counter: fileCounter
      });

      if (res) {
        replaceLoadingWithOutput(tempUiId, res);
      } else {
        const loader = document.getElementById(`loading-task-${tempUiId}`);
        if (loader) loader.remove();
        updateBulkDownloadVisibility();
        showStatus('✗ Extraction request failed.', 'text-red-400');
      }
    }



    async function postAction(url, body) {
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) return null;
        showStatus('✓ Process completed.', 'text-green-400');
        return await res.text();
      } catch (e) { return null; }
    }

    function showPreview(card) {
      const img = card.querySelector('.page-img');
      const modalImg = document.getElementById('preview-img');
      const modal = document.getElementById('preview-modal');
      modalImg.src = img.src;
      modalImg.style.transform = img.style.transform;
      modal.classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closePreview() {
      const p = document.getElementById('preview-modal');
      if(p) p.classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    function appendToOutputList(html) {
      const list = document.getElementById('output-list');
      const empty = document.getElementById('output-empty');
      if (empty) empty.remove();
      const wrapper = document.createElement('li');
      wrapper.innerHTML = html;
      list.appendChild(wrapper);
      updateBulkDownloadVisibility();
    }

    function updateBulkDownloadVisibility() {
      const container = document.getElementById('bulk-download-container');
      const list = document.getElementById('output-list');
      if (!list || !container) return;
      const items = list.querySelectorAll('.pdf-item');
      if (items.length > 0) {
        container.classList.remove('hidden');
      } else {
        container.classList.add('hidden');
      }
    }

    function downloadAllAsZip() {
      const links = document.querySelectorAll('#output-list .download-btn');
      if (links.length === 0) return;
      const ids = Array.from(links).map(a => a.dataset.fileId);
      
      let url = `/download-zip?file_ids=${ids.join(',')}`;
      window.location.href = url;
    }

    function downloadAllNumberedAsZip() {
      const links = document.querySelectorAll('#output-list .download-btn');
      if (links.length === 0) return;
      const ids = Array.from(links).map(a => a.dataset.fileId);
      
      let url = `/download-zip-numbered?file_ids=${ids.join(',')}`;
      window.location.href = url;
    }

    function downloadSingleFile(fileId, btn) {
      const listItems = Array.from(document.querySelectorAll('#output-list li'));
      const li = btn.closest('li');
      let count = 0;
      let index = 1;
      for (let i = 0; i < listItems.length; i++) {
         if (listItems[i].id === 'output-empty') continue;
         count++;
         if (listItems[i] === li) {
            index = count;
            break;
         }
      }
      window.location.href = `/download/${fileId}?ek_no=${index}`;
    }

    let currentPreviewZoom = 1;
    let currentTranslateX = 0;
    let currentTranslateY = 0;
    let isDraggingPreview = false;
    let dragStartX = 0;
    let dragStartY = 0;

    function zoomPreview(delta) {
        currentPreviewZoom += delta;
        if (currentPreviewZoom < 0.2) currentPreviewZoom = 0.2;
        if (currentPreviewZoom > 5) currentPreviewZoom = 5;
        applyPreviewZoom();
    }
    function resetZoom() {
        currentPreviewZoom = 1;
        currentTranslateX = 0;
        currentTranslateY = 0;
        applyPreviewZoom();
    }
    function applyPreviewZoom() {
        const img = document.getElementById('naming-preview-img');
        if (img) {
            let rotationStr = "";
            if (img.dataset.rotation) {
                rotationStr = `rotate(${img.dataset.rotation}deg)`;
            }
            // Applying translate first (leftmost) means translation is in unscaled screen coordinates
            img.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentPreviewZoom}) ${rotationStr}`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('preview-scroll-container');
        if (container) {
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    zoomPreview(0.1);
                } else {
                    zoomPreview(-0.1);
                }
            });

            container.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // Only left click
                isDraggingPreview = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                container.classList.add('cursor-grabbing');
                container.classList.remove('cursor-move');
            });
            
            window.addEventListener('mouseup', () => {
                isDraggingPreview = false;
                if (container) {
                    container.classList.remove('cursor-grabbing');
                    container.classList.add('cursor-move');
                }
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isDraggingPreview) return;
                e.preventDefault();
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                
                currentTranslateX += dx;
                currentTranslateY += dy;
                applyPreviewZoom();
            });
        }
    });
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('custom-filename');
        if (input) {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    proceedToExtract(); // Submit when hitting enter
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            const isCtrl = e.ctrlKey || e.metaKey;
            const activeEl = document.activeElement;
            const isInput = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.isContentEditable);

            if (isCtrl && (e.key === 'z' || e.key === 'Z')) {
                if (isInput) return; // Let default browser undo work inside inputs
                e.preventDefault();
                undoLastSelection();
            }
            
            if (isCtrl && (e.key === 'x' || e.key === 'X')) {
                if (isInput) return; // Let default browser cut work inside inputs
                e.preventDefault();
                doExtract();
            }
        });
    });

    function undoLastSelection() {
        if (selectionHistory.length === 0) return;
        const lastAction = selectionHistory.pop();
        
        lastAction.added.forEach(id => selectedPages.delete(id));
        lastAction.removed.forEach(id => selectedPages.add(id));
        lastClickedCardId = lastAction.prevAnchor;
        
        updateHighlight();
        updateSelectionInfo();
    }
  </script>
</body>
