<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JETEK</title>
  <link rel="icon" type="image/jpeg" href="/static/icon.jpg" />
  <meta name="description"
    content="Professional PDF tool to extract, rotate, and optimize pages with advanced text recognition and cleanup." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css?v=4" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <!-- SortableJS script'ini ekle -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    @keyframes domino-jump {
      0% { transform: translateY(0); border-color: #1f2937; }
      30% { transform: translateY(-6px); border-color: #3b82f6; background-color: #1f2937; }
      100% { transform: translateY(0); border-color: #1f2937; }
    }
    .animate-domino {
      animation: domino-jump 0.6s ease-out;
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

  <!-- HEADER -->
  <header class="bg-gray-900 border-b border-gray-800 px-3 sm:px-6 py-3 flex items-center gap-3 shrink-0 relative overflow-hidden">
    <!-- Subtle speed lines background in header -->
    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(59,130,246,0.3) 10px, rgba(59,130,246,0.3) 12px);"></div>

    <!-- Sidebar toggle: mobile/tablet only, opens the left panel as an overlay drawer -->
    <button id="btn-sidebar-toggle" class="lg:hidden relative z-10 p-1.5 text-gray-300 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors shrink-0" onclick="toggleSidebar()" title="Menü" aria-label="Menü">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <div class="relative flex items-center justify-center bg-gradient-to-br from-blue-500 to-cyan-400 rounded-lg p-1.5 shadow-[0_0_15px_rgba(34,211,238,0.4)] shrink-0">
      <svg class="w-5 h-5 text-gray-900 translate-x-0.5 -translate-y-0.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    </div>
    <h1 class="text-2xl font-black tracking-widest italic flex items-center relative z-10 drop-shadow-md">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-blue-600">JET</span>
      <span class="text-gray-100">EK</span>
    </h1>
  </header>

  <!-- MAIN: Sol Panel + PDF Viewer -->
  <main class="flex flex-1 overflow-hidden relative">

    <!-- Backdrop: only shown on mobile/tablet while the sidebar drawer is open -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/60 z-30 lg:hidden" onclick="toggleSidebar()"></div>

    <!-- LEFT PANEL: Generated PDFs -->
    <aside id="sidebar" class="w-72 sm:w-64 shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 flex gap-2">
        <!-- Batch Mode Toggle Button -->
        <button id="btn-batch-mode" class="flex-1 py-1.5 text-gray-400 bg-gray-800 hover:bg-gray-700 hover:text-white rounded transition-colors flex items-center justify-center border border-transparent" title="Grup Izgara Düzeni" onclick="toggleBatchMode()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </button>
        <!-- AI Rename Button (Dropdown) -->
        <div class="relative flex-1 group">
          <button class="w-full py-1.5 text-gray-400 bg-gray-800 hover:bg-gray-700 hover:text-yellow-400 rounded transition-colors flex items-center justify-center" onclick="this.nextElementSibling.classList.toggle('hidden')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </button>
          <div class="hidden absolute top-full left-0 mt-1 w-40 bg-gray-800 border border-gray-700 rounded shadow-lg z-50 overflow-hidden">
            <button class="w-full text-left px-3 py-2 text-xs text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" onclick="runJetRenameAll(); this.parentElement.classList.add('hidden')">Jetle isimlendir</button>
            <button class="w-full text-left px-3 py-2 text-xs text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">Detayla isimlendir</button>
          </div>
        </div>
      </div>
      <ul id="output-list" class="flex-1 overflow-y-auto p-3 space-y-2" hx-swap-oob="true">
        <li id="output-empty" class="text-xs text-gray-600 italic text-center mt-8">
          Henüz PDF oluşturulmadı.
        </li>
      </ul>
      <!-- Bulk Download Container -->
      <div id="bulk-download-container" class="hidden p-3 border-t border-gray-800 bg-gray-900 space-y-2">

        <button id="btn-download-all" 
          class="w-full py-2 text-xs font-semibold bg-blue-600 hover:bg-blue-500 text-white rounded-lg border border-blue-500 transition-all duration-150 flex items-center justify-center gap-1.5 shadow-lg shadow-blue-500/20 cursor-pointer" 
          onclick="downloadAllAsZip()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Sadece İndir
        </button>
        <button id="btn-download-numbered" 
          class="w-full py-2 text-xs font-semibold bg-blue-600 hover:bg-blue-500 text-white rounded-lg border border-blue-500 transition-all duration-150 flex items-center justify-center gap-1.5 shadow-lg shadow-blue-500/20 cursor-pointer" 
          onclick="downloadAllNumberedAsZip()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          İndir ve Ek Numarası Ekle
        </button>
      </div>
    </aside>

    <!-- PDF VIEWER -->
    <section class="flex-1 min-w-0 flex flex-col overflow-hidden">

      <!-- Toolbar -->
      <div id="toolbar" class="hidden bg-gray-900 border-b border-gray-800 px-3 sm:px-5 py-2 flex flex-wrap items-center gap-2 sm:gap-3 shrink-0">
        <div id="selection-info-container" class="flex flex-wrap items-center gap-2 sm:gap-3">
          <span id="selection-info" class="text-sm text-gray-400 shrink-0 whitespace-nowrap">
            Seçmek için sayfalara tıklayın.
          </span>
          <div id="batch-nav-ui" class="hidden flex flex-col justify-center gap-1 border-l border-gray-700 pl-3 ml-2 w-full sm:w-auto">
            <div class="flex flex-wrap gap-2">
              <div class="relative w-full sm:w-auto sm:flex-1 sm:min-w-[220px] sm:max-w-[576px]">
                <input type="text" id="batch-name-input"
                  class="w-full bg-gray-800 text-gray-200 px-3 py-3 rounded-lg text-base font-medium border border-gray-700 focus:border-blue-500 focus:outline-none transition-colors pr-10"
                  placeholder="Grup Adı"
                  onchange="renameActiveBatch(this.value)" />
                <span id="batch-nav-status" class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-500 font-mono">0/0</span>
              </div>
              <button id="btn-update-batch"
                class="action-btn bg-blue-600 hover:bg-blue-500 text-white border-blue-500 shrink-0"
                onclick="updateActiveBatch()" title="Bu gruptaki döndürme / silme / sıralama değişikliklerini kaydet">
                Güncelle
              </button>
            </div>
            <div class="flex items-center gap-2 justify-center">
              <button onclick="prevBatch()" class="text-gray-400 hover:text-white p-1 bg-gray-800 hover:bg-gray-700 rounded transition-colors flex items-center justify-center border border-gray-700 w-8 h-6" title="Önceki Grup (Alt + Sol)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
              </button>
              <button onclick="nextBatch()" class="text-gray-400 hover:text-white p-1 bg-gray-800 hover:bg-gray-700 rounded transition-colors flex items-center justify-center border border-gray-700 w-8 h-6" title="Sonraki Grup (Alt + Sağ)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="selectAllPages()">
            Tümünü Seç
          </button>
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="clearSelection()">
            Seçimi Temizle
          </button>
          <button id="btn-delete-selected"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-red-500 rounded border border-gray-700 transition-colors"
            onclick="deleteSelectedPages()">
            Seçilenleri Sil
          </button>
          <button id="btn-restore-all"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-yellow-500 rounded border border-gray-700 transition-colors"
            onclick="restoreAllPages()">
            Tümünü Geri Yükle
          </button>
        </div>

        <div class="hidden sm:block h-6 w-px bg-gray-800 mx-1"></div>

        <button id="btn-extract" class="action-btn bg-blue-600 hover:bg-blue-500 text-white border-blue-500"
          onclick="doExtract()" title="Seçili Sayfaları Ayıkla">
          ✂ Ayıkla
        </button>
      </div>

      <!-- Page list -->
      <div id="viewer" class="flex-1 overflow-y-auto px-3 sm:px-6 py-3 sm:py-4">
        <div id="upload-hint" class="flex flex-col items-center justify-center h-full gap-4 text-gray-600">
          <svg class="w-20 h-20" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          <p class="text-lg">Aşağıdan bir PDF yükleyin</p>
        </div>
      </div>
    </section>
  </main>

  <!-- UPLOAD AREA -->
  <footer class="bg-gray-900 border-t border-gray-800 px-3 sm:px-6 py-3 sm:py-4 shrink-0 relative">
    <div id="drop-zone" class="relative border-2 border-dashed border-gray-700 rounded-xl p-3 sm:p-5 text-center
             hover:border-blue-500 transition-colors duration-200 overflow-hidden cursor-pointer"
      ondragover="event.preventDefault(); this.classList.add('border-blue-400','bg-blue-950')"
      ondragleave="this.classList.remove('border-blue-400','bg-blue-950')"
      ondrop="handleDrop(event)">

      <input id="file-input" type="file" accept=".pdf,.tiff,.tif,.jpeg,.jpg,.png" multiple
        class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"
        onchange="uploadFile(this)" title="Dosya seçin veya buraya sürükleyin" />

      <p class="text-sm text-gray-400 pointer-events-none relative z-0">
        <span class="text-blue-400 font-semibold">Dosya seç (PDF, Tiff, Jpeg, Png)</span> veya buraya sürükleyin
      </p>
    </div>
    
    <!-- BATCH MODE NAVIGATION UI MOVED TO TOOLBAR -->

    <div id="upload-status" class="text-xs text-center mt-2 text-gray-500 hidden"></div>
  </footer>

  <!-- PREVIEW MODAL -->
  <div id="preview-modal" class="modal-overlay" onclick="closePreview()">
    <div class="modal-content relative group cursor-pointer" onclick="closePreview()">
      <img id="preview-img" src="" alt="Preview" class="transition-transform duration-300">
    </div>
  </div>

  <!-- NAMING MODAL -->
  <div id="naming-modal" class="modal-overlay" onclick="closeNamingModal()">
    <div class="modal-content bg-gray-900 border border-gray-800 rounded-2xl p-0 flex flex-col shadow-2xl overflow-hidden"
      style="max-width: 60rem; width: 100%; height: 90vh;" onclick="event.stopPropagation()">
      
      <!-- Top: Preview (Large) -->
      <div class="w-full flex-1 bg-gray-950 p-2 sm:p-4 flex flex-col border-b border-gray-800 overflow-hidden relative">
          <div class="flex justify-between items-center mb-2 z-10">
              <p id="preview-modal-title" class="text-xs text-gray-400 uppercase tracking-widest font-semibold">İlk Sayfa Önizlemesi</p>
              <div class="flex gap-2">
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs font-bold" onmousedown="event.preventDefault();" onclick="zoomPreview(0.2)">+</button>
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs font-bold" onmousedown="event.preventDefault();" onclick="zoomPreview(-0.2)">-</button>
                  <button type="button" class="bg-gray-800 text-white rounded px-3 py-1 hover:bg-gray-700 text-xs" onmousedown="event.preventDefault();" onclick="resetZoom(true)">Sıfırla</button>
              </div>
          </div>
          <div class="flex-1 overflow-hidden bg-gray-900 rounded-lg border border-gray-800 relative flex items-start justify-center cursor-move" id="preview-scroll-container">
              <img id="naming-preview-img" src="" draggable="false" class="w-full h-auto drop-shadow-md transition-transform origin-top" style="transform: scale(1);">
          </div>
      </div>

      <!-- Bottom: Form -->
      <div class="w-full px-3 py-4 sm:px-4 sm:py-6 flex flex-col justify-center shrink-0">
          <div class="mb-4 w-full flex flex-col gap-3">
            <div class="flex items-center justify-between px-2" id="preview-nav-container" style="display: none;">
                <button type="button" id="preview-batch-prev-btn" class="text-gray-400 hover:text-white px-2 cursor-pointer focus:outline-none disabled:hover:text-gray-400" onmousedown="event.preventDefault();" onclick="previewPrevBatch()" title="Önceki Grup (Alt + Yukarı)"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg></button>
                <div class="flex flex-col items-center gap-1">
                    <div class="flex items-center gap-2 text-xs text-gray-400 font-medium" id="preview-page-nav" style="display: none;">
                        <span>Sayfa</span>
                        <input type="number" id="preview-page-input" class="bg-gray-800 border border-gray-700 text-white rounded px-2 py-1 w-12 text-center focus:outline-none" onchange="previewGoToPage()">
                        <span>/ <span id="preview-total-pages">1</span></span>
                    </div>
                    <span id="preview-batch-status" class="text-xs text-gray-400 font-medium font-mono" style="display: none;"></span>
                </div>
                <button type="button" id="preview-batch-next-btn" class="text-gray-400 hover:text-white px-2 cursor-pointer focus:outline-none disabled:hover:text-gray-400" onmousedown="event.preventDefault();" onclick="previewNextBatch()" title="Sonraki Grup (Alt + Aşağı)"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg></button>
            </div>
            <div class="w-full relative">
                <textarea id="custom-filename" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-6 py-4 text-white text-sm font-medium focus:outline-none focus:border-blue-500 transition-colors shadow-inner resize-none" placeholder="belge ismini buraya yazınız" autocomplete="off"></textarea>
            </div>
          </div>
          <div class="flex justify-center gap-4 w-full mt-2">
            <button
              class="flex-1 px-5 py-3 text-base bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl border border-gray-700 transition-colors font-medium"
              onclick="closeNamingModal()">
              İptal
            </button>
            <button
              class="flex-1 px-5 py-3 text-base bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition-colors"
              onclick="proceedToExtract()">
              İleri
            </button>
          </div>
      </div>

    </div>
  </div>

  <script>
    let batchPreviewItems = [];
    let currentBatchPreviewIndex = 0;
    
    let selectedPages = new Set();
    let selectionHistory = []; // Track selection actions for undo
    let deletedPages = new Set();
    let lastClickedCardId = null;

    // Pages consumed by an extraction are hidden from their source grid. Keyed by the
    // source id (an original upload's pdf_id, or an already-extracted batch's file_id,
    // since Batch Mode lets you extract from an extraction) -> Set of page indices.
    // This is separate from the DOM so it survives fetchAndRenderBatch() re-rendering
    // the grid from scratch when switching batches.
    let extractedPageIndices = {};
    // What each output (keyed by its temp UI id, then renamed to its real file_id once
    // the server responds) consumed, so deleting that output can restore those pages.
    let outputSourcePages = {};
    let pageRotations = {};
    let sortableInstance = null;
    let currentCustomName = '';
    let fileCounter = 1;
    let pendingFiles = [];
    
    // Batch Mode variables
    let isBatchMode = false;
    let originalPdfId = null;
    let originalPageCount = 0;
    let originalFilename = '';
    let currentBatchIndex = -1;

    // Mobile/tablet left-panel drawer (see #sidebar / #sidebar-backdrop rules in
    // app.css) — the sidebar is always visible as a static column at the lg breakpoint
    // and up, so this toggle only has a visible effect below that width.
    function toggleSidebar() {
      document.body.classList.toggle('sidebar-open');
    }

    function handleDrop(e) {
      console.log('DEBUG: handleDrop called', e);
      e.preventDefault();
      const zone = document.getElementById('drop-zone');
      if (zone) zone.classList.remove('border-blue-400', 'bg-blue-950');
      const files = Array.from(e.dataTransfer.files);
      console.log('DEBUG: handleDrop files:', files);
      if (files.length > 0) {
        processFiles(files);
      }
    }

    function uploadFile(input) {
      console.log('DEBUG: uploadFile called, input value:', input.value);
      const zone = document.getElementById('drop-zone');
      if (zone) zone.classList.remove('border-blue-400', 'bg-blue-950');
      const files = Array.from(input.files);
      console.log('DEBUG: uploadFile files:', files);
      if (files.length > 0) {
        processFiles(files);
      }
      console.log('DEBUG: resetting input.value to empty string');
      input.value = ""; // reset
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const viewer = document.getElementById('viewer');
      viewer.addEventListener('dragover', (e) => {
        e.preventDefault();
        viewer.classList.add('bg-gray-800', 'bg-opacity-50');
      });
      viewer.addEventListener('dragleave', (e) => {
        viewer.classList.remove('bg-gray-800', 'bg-opacity-50');
      });
      viewer.addEventListener('drop', (e) => {
        e.preventDefault();
        viewer.classList.remove('bg-gray-800', 'bg-opacity-50');
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) {
          processFiles(files);
        }
      });
      
      const outputList = document.getElementById('output-list');
      if (outputList) {
        new Sortable(outputList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          forceFallback: true,
          fallbackClass: 'sortable-drag',
          filter: 'button, a',
          preventOnFilter: false
        });
      }

      updateBulkDownloadVisibility();
    });

    async function processFiles(files) {
      const validExts = ['.pdf', '.tiff', '.tif', '.jpeg', '.jpg', '.png'];
      let current = 0;
      let total = files.length;
      let skipped = 0;
      let failed = 0;
      let success = 0;
      
      for (let file of files) {
        current++;
        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
        if (!validExts.includes(ext)) {
          skipped++;
          continue;
        }
        showStatus(`⏳ ${file.name} yükleniyor (${current}/${total})...`, 'text-gray-400');
        const isOk = await sendFile(file);
        if (isOk) {
            success++;
        } else {
            failed++;
        }
      }

      if (skipped > 0 || failed > 0) {
        let msgs = [];
        if (success > 0) msgs.push(`${success} yüklendi`);
        if (skipped > 0) msgs.push(`${skipped} atlandı (desteklenmiyor)`);
        if (failed > 0) msgs.push(`${failed} başarısız`);
        showStatus(`⚠ ${msgs.join(', ')}.`, 'text-yellow-400');
      } else if (success > 0) {
        showStatus(`✓ ${success} yükleme tamamlandı.`, 'text-green-400');
      } else {
        showStatus(`⚠ Yüklenecek geçerli dosya yok.`, 'text-yellow-400');
      }
    }

    function initSortable() {
      const inner = document.getElementById('viewer-inner');
      const viewer = document.getElementById('viewer');
      if (!inner) return;

      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = new Sortable(inner, {
        multiDrag: true,
        multiDragKey: 'ctrl',
        selectedClass: 'sortable-native-selected',
        animation: 150,
        handle: '.drag-handle',
        forceFallback: true,
        fallbackClass: 'sortable-drag',
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        scroll: viewer,
        scrollSensitivity: 80,
        scrollSpeed: 20
      });
    }

    async function sendFile(file) {
      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json();
          showStatus('✗ Hata: ' + err.detail, 'text-red-400');
          return false;
        }

        const html = await res.text();
        const viewer = document.getElementById('viewer');
        
        let inner = document.getElementById('viewer-inner');
        if (!inner) {
          viewer.innerHTML = html;
        } else {
          // Robustly append elements
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = html.trim();
          
          // find the viewer-inner or assume tempDiv's first child
          const newInner = tempDiv.querySelector('#viewer-inner') || tempDiv.firstElementChild;
          if (newInner) {
            // Append all children to existing grid
            while (newInner.firstChild) {
              inner.appendChild(newInner.firstChild);
            }
          }
        }

        if (typeof htmx !== 'undefined') {
          htmx.process(document.getElementById('viewer'));
        }

        document.getElementById('toolbar').classList.remove('hidden');
        document.getElementById('upload-hint')?.remove();

        initSortable();
        return true;
      } catch (err) {
        showStatus('✗ Bağlantı hatası.', 'text-red-400');
        return false;
      }
    }

    function showStatus(msg, cls) {
      const el = document.getElementById('upload-status');
      if (!el) return;
      el.textContent = msg;
      el.className = `text-xs text-center mt-2 ${cls}`;
      el.classList.remove('hidden');
    }

    function selectPage(card, event) {
      if (event.target.closest('.drag-handle') || event.target.closest('.small-rotate-btn') || event.target.closest('.delete-btn-inline')) return;
      
      const cid = card.id;
      if (deletedPages.has(cid) || card.classList.contains('extracted-page')) return;

      const isShift = event.shiftKey;
      const isMeta = event.ctrlKey || event.metaKey;
      
      const added = [];
      const removed = [];
      const prevAnchor = lastClickedCardId;

      if (!isShift && !isMeta) {
        showPreview(card);
      } else if (isShift) {
        const cards = Array.from(document.querySelectorAll('.page-card'));
        const idx1 = lastClickedCardId ? cards.findIndex(c => c.id === lastClickedCardId) : -1;
        const idx2 = cards.findIndex(c => c === card);
        if (idx1 !== -1 && idx2 !== -1) {
          const start = Math.min(idx1, idx2);
          const end = Math.max(idx1, idx2);
          for (let i = start; i <= end; i++) {
            const currentId = cards[i].id;
            if (!deletedPages.has(currentId) && !selectedPages.has(currentId) && !cards[i].classList.contains('extracted-page')) {
              selectedPages.add(currentId);
              added.push(currentId);
            }
          }
        } else {
          if (!selectedPages.has(cid)) {
            selectedPages.add(cid);
            added.push(cid);
          }
        }
      } else if (isMeta) {
        if (selectedPages.has(cid)) {
          selectedPages.delete(cid);
          removed.push(cid);
        } else {
          selectedPages.add(cid);
          added.push(cid);
        }
      }
      
      if (isShift || isMeta) {
        if (added.length > 0 || removed.length > 0) {
          selectionHistory.push({ added, removed, prevAnchor });
        }
        lastClickedCardId = cid;
      }
      
      updateHighlight();
      updateSelectionInfo();
    }

    function selectAllPages() {
      document.querySelectorAll('.page-card').forEach(c => {
        if (!deletedPages.has(c.id) && !c.classList.contains('extracted-page')) selectedPages.add(c.id);
      });
      updateHighlight();
      updateSelectionInfo();
    }

    function clearSelection() {
      selectedPages.clear();
      selectionHistory = [];
      lastClickedCardId = null;
      updateHighlight();
      updateSelectionInfo();
    }

    function updateHighlight() {
      document.querySelectorAll('.page-card').forEach(card => {
        const shouldBeSelected = selectedPages.has(card.id);
        card.classList.toggle('selected', shouldBeSelected);

        try {
          if (typeof Sortable !== 'undefined' && Sortable.utils && Sortable.utils.select) {
            if (shouldBeSelected) Sortable.utils.select(card);
            else Sortable.utils.deselect(card);
          }
        } catch (e) { }
      });
    }

    function updateSelectionInfo() {
      const info = document.getElementById('selection-info');
      if(info) info.textContent = selectedPages.size === 0 ? 'Sayfa seçin' : `${selectedPages.size} sayfa seçildi.`;

      const btnDeleteSelected = document.getElementById('btn-delete-selected');
      if (btnDeleteSelected) {
        btnDeleteSelected.classList.toggle('hidden', selectedPages.size === 0);
      }

      const btnRestoreAll = document.getElementById('btn-restore-all');
      if (btnRestoreAll) {
        btnRestoreAll.classList.toggle('hidden', deletedPages.size === 0);
      }
    }

    function deleteSelectedPages() {
      selectedPages.forEach(cid => {
        deletedPages.add(cid);
        const card = document.getElementById(cid);
        if (card) {
          card.classList.add('deleted-page');
          card.classList.remove('selected');
        }
      });
      selectedPages.clear();
      updateSelectionInfo();
    }

    function deletePage(event, card) {
      event.stopPropagation();
      deletedPages.add(card.id);
      card.classList.add('deleted-page');
      card.classList.remove('selected');
      selectedPages.delete(card.id);
      updateSelectionInfo();
    }

    function restorePage(event, card) {
      event.stopPropagation();
      deletedPages.delete(card.id);
      card.classList.remove('deleted-page');
      updateSelectionInfo();
    }

    function restoreAllPages() {
      deletedPages.clear();
      document.querySelectorAll('.page-card').forEach(card => card.classList.remove('deleted-page'));
      updateSelectionInfo();
    }

    function rotateSinglePage(event, card, direction) {
      event.stopPropagation();
      const angle = direction === 'left' ? -90 : 90;
      let currentRotation = pageRotations[card.id] || 0;
      currentRotation = (currentRotation + angle) % 360;
      if (currentRotation < 0) currentRotation += 360;
      pageRotations[card.id] = currentRotation;
      const img = card.querySelector('.page-img');
      if (img) img.style.transform = `rotate(${currentRotation}deg)`;
    }

    function closeNamingModal() {
      const m = document.getElementById('naming-modal');
      if(m) m.classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    function doExtract() {
      if (selectedPages.size === 0) return;
      currentCustomName = ''; // Force auto-naming
      confirmExtract(true);
    }

    // Every generated PDF in the left panel is a "batch". Ordered by DOM position
    // so batch-switching in the rename preview matches the order shown in the list.
    function getRenameQueueButtons() {
        return Array.from(document.querySelectorAll('#output-list li:not(#output-empty) .rename-btn'));
    }

    function updateBatchPreviewUI() {
        if (batchPreviewItems.length === 0) return;
        const item = batchPreviewItems[currentBatchPreviewIndex];

        const previewImg = document.getElementById('naming-preview-img');
        if (previewImg) {
            previewImg.src = item.src;
            previewImg.dataset.rotation = item.rotation;
            if (typeof resetZoom === 'function') resetZoom();
        }

        const queueButtons = getRenameQueueButtons();
        const queueLength = queueButtons.length;
        const queueIndex = queueButtons.findIndex(btn => btn.dataset.fileId === renamingFileId);
        const hasMultiplePages = batchPreviewItems.length > 1;
        const hasMultipleBatches = queueLength > 1;

        const titleEl = document.getElementById('preview-modal-title');
        if (titleEl) titleEl.textContent = hasMultiplePages ? "Grup Önizlemesi" : "İlk Sayfa Önizlemesi";

        const navContainer = document.getElementById('preview-nav-container');
        if (navContainer) navContainer.style.display = (hasMultiplePages || hasMultipleBatches) ? "flex" : "none";

        const pageNav = document.getElementById('preview-page-nav');
        if (pageNav) {
            pageNav.style.display = hasMultiplePages ? "flex" : "none";
            if (hasMultiplePages) {
                document.getElementById('preview-page-input').value = currentBatchPreviewIndex + 1;
                document.getElementById('preview-total-pages').textContent = batchPreviewItems.length;
            }
        }

        const batchStatus = document.getElementById('preview-batch-status');
        if (batchStatus) {
            batchStatus.style.display = hasMultipleBatches ? "block" : "none";
            if (hasMultipleBatches) {
                batchStatus.textContent = `Grup ${queueIndex + 1} / ${queueLength}`;
            }
        }

        [document.getElementById('preview-batch-prev-btn'), document.getElementById('preview-batch-next-btn')].forEach(btn => {
            if (!btn) return;
            btn.disabled = !hasMultipleBatches;
            btn.classList.toggle('opacity-30', !hasMultipleBatches);
            btn.classList.toggle('cursor-not-allowed', !hasMultipleBatches);
        });
    }

    function previewPrevPage() {
        if (batchPreviewItems.length === 0) return;
        currentBatchPreviewIndex--;
        if (currentBatchPreviewIndex < 0) {
            currentBatchPreviewIndex = batchPreviewItems.length - 1;
        }
        updateBatchPreviewUI();
    }
    
    function previewNextPage() {
        if (batchPreviewItems.length === 0) return;
        currentBatchPreviewIndex++;
        if (currentBatchPreviewIndex >= batchPreviewItems.length) {
            currentBatchPreviewIndex = 0;
        }
        updateBatchPreviewUI();
    }
    
    function previewGoToPage() {
        const input = document.getElementById('preview-page-input');
        let val = parseInt(input.value);
        if (isNaN(val)) val = 1;
        
        if (val < 1) {
            val = batchPreviewItems.length;
        } else if (val > batchPreviewItems.length) {
            val = 1;
        }
        
        currentBatchPreviewIndex = val - 1;
        updateBatchPreviewUI();
    }

    let renamingFileId = null;

    function proceedToExtract() {
      let input = document.getElementById('custom-filename').value.replace(/[\r\n]+/g, ' ').trim();
      currentCustomName = input || (renamingFileId ? 'renamed_file' : 'extracted'); 
      
      closeNamingModal();
      
      if (renamingFileId) {
        submitRename(renamingFileId, currentCustomName);
        renamingFileId = null;
      } else {
        confirmExtract(true);
      }
    }

    function loadRenameModalContent(fileId, currentName, pageCount) {
      renamingFileId = fileId;

      batchPreviewItems = [];
      for (let i = 0; i < pageCount; i++) {
        batchPreviewItems.push({ src: '/page/' + fileId + '/' + i, rotation: 0 });
      }
      currentBatchPreviewIndex = 0;
      updateBatchPreviewUI();

      const input = document.getElementById('custom-filename');
      input.value = currentName.replace(/\.pdf$/i, '');
    }

    function openRenameModal(fileId, currentName, pageCount = 1) {
      loadRenameModalContent(fileId, currentName, pageCount);

      const m = document.getElementById('naming-modal');
      if (m) m.classList.add('active');
      document.body.classList.add('modal-open');

      document.getElementById('custom-filename').focus();
    }

    // Switches the rename preview to the previous/next generated PDF ("batch") in the
    // left panel, wrapping around. Independent of the main grid's Batch Mode navigation.
    function previewPrevBatch() {
      const queueButtons = getRenameQueueButtons();
      if (queueButtons.length <= 1) return;
      let idx = queueButtons.findIndex(btn => btn.dataset.fileId === renamingFileId);
      if (idx === -1) idx = 0;
      idx = (idx - 1 + queueButtons.length) % queueButtons.length;
      switchRenameModalToQueueButton(queueButtons[idx]);
    }

    function previewNextBatch() {
      const queueButtons = getRenameQueueButtons();
      if (queueButtons.length <= 1) return;
      let idx = queueButtons.findIndex(btn => btn.dataset.fileId === renamingFileId);
      if (idx === -1) idx = 0;
      idx = (idx + 1) % queueButtons.length;
      switchRenameModalToQueueButton(queueButtons[idx]);
    }

    function switchRenameModalToQueueButton(btn) {
      const fileId = btn.dataset.fileId;
      const pageCount = parseInt(btn.dataset.pageCount, 10) || 1;
      const filenameEl = btn.closest('li')?.querySelector('p.truncate');
      const filename = filenameEl ? filenameEl.textContent : fileId;
      loadRenameModalContent(fileId, filename, pageCount);
      document.getElementById('custom-filename').focus();
    }

    async function submitRename(fileId, newName) {
      const res = await postAction('/rename/' + fileId, { custom_name: newName });
      if (res) {
        const link = document.querySelector(`.download-btn[data-file-id='${fileId}']`);
        if (link) {
          const li = link.closest('li');
          if (li) {
            li.innerHTML = res;
          }
        }
      }
    }

    function appendLoadingToOutputList(taskId, filename) {
      const list = document.getElementById('output-list');
      const empty = document.getElementById('output-empty');
      if (empty) empty.remove();
      
      const wrapper = document.createElement('li');
      wrapper.id = `loading-task-${taskId}`;
      wrapper.innerHTML = `
        <div class="pdf-item opacity-75 border border-dashed border-gray-800 p-2.5 rounded-lg bg-gray-900/50 flex flex-col gap-2">
          <div class="flex items-start gap-2">
            <svg class="animate-spin w-4 h-4 text-blue-500 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            <div class="flex-1 min-w-0">
              <p class="text-xs font-medium text-gray-400 truncate" title="${filename}">${filename}</p>
              <p class="text-[10px] text-blue-400 font-semibold animate-pulse mt-0.5">İşleniyor...</p>
            </div>
          </div>
          <div class="w-full bg-gray-850 rounded-full h-1 overflow-hidden">
            <div class="bg-blue-500 h-1 rounded-full w-2/3 animate-pulse"></div>
          </div>
        </div>
      `;
      if (isBatchMode && currentBatchIndex >= 0) {
        const listItems = list.querySelectorAll('li:not(#output-empty)');
        const parentLi = listItems[currentBatchIndex];
        const parentFileId = parentLi ? getListItemFileId(parentLi) : null;
        if (parentLi && parentFileId) {
          wrapper.dataset.parentFileId = parentFileId;
          // Insert after the last existing item in this batch's group (the parent itself,
          // or the most recent prior extraction from it) so repeated extractions from the
          // same batch stack in chronological order underneath it, instead of each new one
          // jumping straight above the previous one.
          let insertAfter = parentLi;
          let sibling = parentLi.nextElementSibling;
          while (sibling && sibling.dataset.parentFileId === parentFileId) {
            insertAfter = sibling;
            sibling = sibling.nextElementSibling;
          }
          insertAfter.insertAdjacentElement('afterend', wrapper);
        } else {
          list.appendChild(wrapper);
        }
      } else {
        list.appendChild(wrapper);
      }
      updateBulkDownloadVisibility();
    }

    function getListItemFileId(li) {
      return li?.querySelector('[data-file-id]')?.dataset.fileId || null;
    }

    // Marks the given page-card elements as consumed by outputKey: hides them from
    // their source grid immediately, and records what to restore if outputKey is
    // later deleted from the output list.
    function markPagesExtracted(cardEls, outputKey) {
      outputSourcePages[outputKey] = cardEls.map(card => ({
        pdf_id: card.dataset.pdfId,
        page_idx: parseInt(card.dataset.pageIndex)
      }));
      cardEls.forEach(card => {
        const pid = card.dataset.pdfId;
        const idx = parseInt(card.dataset.pageIndex);
        if (!extractedPageIndices[pid]) extractedPageIndices[pid] = new Set();
        extractedPageIndices[pid].add(idx);
        card.classList.add('extracted-page');
      });
    }

    // Reverses markPagesExtracted for outputKey: un-hides its source pages (if their
    // grid happens to be visible right now) and forgets they were ever extracted.
    function restoreExtractedPages(outputKey) {
      const sources = outputSourcePages[outputKey];
      if (!sources) return;
      delete outputSourcePages[outputKey];
      sources.forEach(({ pdf_id, page_idx }) => {
        extractedPageIndices[pdf_id]?.delete(page_idx);
      });
      reconcileExtractedState();
    }

    // Re-applies the extracted-page hidden state to whatever .page-card elements are
    // currently in the DOM. Needed after the grid is rebuilt from scratch (batch switch,
    // exiting batch mode) since that HTML comes fresh from the server with no notion of
    // "some of these pages were already consumed by a later extraction".
    function reconcileExtractedState() {
      document.querySelectorAll('.page-card').forEach(card => {
        const pid = card.dataset.pdfId;
        const idx = parseInt(card.dataset.pageIndex);
        card.classList.toggle('extracted-page', !!extractedPageIndices[pid]?.has(idx));
      });
    }

    function replaceLoadingWithOutput(taskId, html) {
      const loader = document.getElementById(`loading-task-${taskId}`);
      if (loader) {
        loader.removeAttribute('id');
        loader.innerHTML = html;
        const realFileId = getListItemFileId(loader);
        if (realFileId && outputSourcePages[taskId] && !outputSourcePages[realFileId]) {
          outputSourcePages[realFileId] = outputSourcePages[taskId];
          delete outputSourcePages[taskId];
        }
        updateBulkDownloadVisibility();
      }
    }

    // Restores any pages this output consumed, then removes it from the list.
    function removeOutputItem(button) {
      const li = button.closest('li');
      const fileId = getListItemFileId(li);
      if (fileId) removeOutputByFileId(fileId);
      else li.remove();
    }

    // Same as removeOutputItem, but addressed by file_id instead of a click on its
    // own button — used when code (rather than the user) decides an output should go
    // away, e.g. a batch that's been emptied out via full extraction or full deletion.
    function removeOutputByFileId(fileId) {
      const btn = document.querySelector(`.download-btn[data-file-id='${fileId}']`);
      const li = btn ? btn.closest('li') : null;
      if (!li) return;
      restoreExtractedPages(fileId);
      li.remove();
      updateBulkDownloadVisibility();
      refreshBatchNavStatus();
    }

    function handleLoadingFailure(taskId, errorMsg) {
      const loader = document.getElementById(`loading-task-${taskId}`);
      if (loader) {
        loader.innerHTML = `
          <div class="pdf-item border border-red-950/50 p-2.5 rounded-lg bg-red-950/20 flex flex-col gap-1.5">
            <div class="flex items-start gap-2">
              <svg class="w-4 h-4 text-red-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <div class="flex-1 min-w-0">
                <p class="text-xs font-medium text-red-400 truncate">Ayıklama Başarısız</p>
                <p class="text-[10px] text-red-500 mt-0.5 line-clamp-2" title="${errorMsg}">${errorMsg}</p>
              </div>
            </div>
            <button class="text-[10px] text-gray-500 hover:text-gray-400 self-end uppercase font-semibold" onclick="this.closest('li').remove(); updateBulkDownloadVisibility();">Kapat</button>
          </div>
        `;
        updateBulkDownloadVisibility();
      }
    }

    async function confirmExtract() {
      if (selectedPages.size === 0) return;

      const cardsInOrder = Array.from(document.querySelectorAll('.page-card'));
      const extractionList = [];
      const extractedCardEls = [];

      cardsInOrder.forEach(card => {
        if (selectedPages.has(card.id) && !deletedPages.has(card.id)) {
          extractionList.push({
             pdf_id: card.dataset.pdfId,
             page_idx: parseInt(card.dataset.pageIndex),
             rotation: pageRotations[card.id] || 0
          });
          extractedCardEls.push(card);
        }
      });

      if(extractionList.length === 0) {
          return;
      }

      // Generate temporary display filename
      let displayFilename = '';
      if (currentCustomName) {
        displayFilename = `${currentCustomName}.pdf`;
      } else {
        displayFilename = `extracted.pdf`;
      }

      // Generate a temp UI ID for tracking until response
      const tempUiId = 'temp-' + Math.random().toString(36).substring(2, 9);
      appendLoadingToOutputList(tempUiId, displayFilename);
      markPagesExtracted(extractedCardEls, tempUiId);
      clearSelection();

      const res = await postAction('/extract', {
        pages: extractionList,
        custom_name: currentCustomName,
        file_counter: fileCounter
      });

      if (res) {
        replaceLoadingWithOutput(tempUiId, res);
        await persistBatchExtractionCut(extractedCardEls); // no-op unless currently viewing a batch in Batch Mode
      } else {
        const loader = document.getElementById(`loading-task-${tempUiId}`);
        if (loader) loader.remove();
        restoreExtractedPages(tempUiId); // extraction failed server-side, undo the optimistic hide
        updateBulkDownloadVisibility();
        showStatus('✗ Ayıklama isteği başarısız oldu.', 'text-red-400');
      }
    }



    async function postAction(url, body) {
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) return null;
        showStatus('✓ İşlem tamamlandı.', 'text-green-400');
        return await res.text();
      } catch (e) { return null; }
    }

    function showPreview(card) {
      const img = card.querySelector('.page-img');
      const modalImg = document.getElementById('preview-img');
      const modal = document.getElementById('preview-modal');
      modalImg.src = img.src;
      modalImg.style.transform = img.style.transform;
      modal.classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closePreview() {
      const p = document.getElementById('preview-modal');
      if(p) p.classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    function appendToOutputList(html) {
      const list = document.getElementById('output-list');
      const empty = document.getElementById('output-empty');
      if (empty) empty.remove();
      const wrapper = document.createElement('li');
      wrapper.innerHTML = html;
      list.appendChild(wrapper);
      updateBulkDownloadVisibility();
    }

    function updateBulkDownloadVisibility() {
      const container = document.getElementById('bulk-download-container');
      const list = document.getElementById('output-list');
      if (!list || !container) return;
      const items = list.querySelectorAll('.pdf-item');
      if (items.length > 0) {
        container.classList.remove('hidden');
      } else {
        container.classList.add('hidden');
      }

    function downloadAllAsZip() {
      const links = document.querySelectorAll('#output-list .download-btn');
      if (links.length === 0) return;
      const ids = Array.from(links).map(a => a.dataset.fileId);
      
      let url = `/download-zip?file_ids=${ids.join(',')}`;

    function downloadAllNumberedAsZip() {
      const links = document.querySelectorAll('#output-list .download-btn');
      if (links.length === 0) return;
      let ids = Array.from(document.querySelectorAll('.download-btn')).map(btn => btn.dataset.fileId);
      if (ids.length === 0) return;

    async function runJetRenameAll() {
      // Find all download buttons in the list to extract the file IDs
      const downloadBtns = Array.from(document.querySelectorAll('#output-list .download-btn'));
      if (downloadBtns.length === 0) return;

      const fileIds = [];
      const originalBtns = {};
      const listItems = {};

      downloadBtns.forEach((btn, index) => {
        const fileId = btn.dataset.fileId;
        const li = btn.closest('li');
        if (!li) return;
        
        fileIds.push(fileId);
        listItems[fileId] = li;

        // Add domino animation class with a slight delay for visual effect
        setTimeout(() => {
          li.classList.add('animate-domino');
          setTimeout(() => li.classList.remove('animate-domino'), 600);
        }, index * 100);

        // Find the rename button (pen icon) and replace it with a spinner temporarily
        const renameBtn = li.querySelector('button[onclick^="openRenameModal"]');
        if (renameBtn) {
          originalBtns[fileId] = renameBtn.outerHTML;
          renameBtn.outerHTML = `<button type="button" class="text-blue-400 cursor-wait focus:outline-none" disabled data-spinner-for="${fileId}">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>`;
        }
      });

      if (fileIds.length === 0) return;

      try {
        const res = await fetch(`/ai/jet-rename-batch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_ids: fileIds })
        });
        
        if (res.ok) {
          const results = await res.json();
          // Update all successfully renamed files
          for (const [fileId, htmlSnippet] of Object.entries(results)) {
             if (listItems[fileId]) {
               listItems[fileId].innerHTML = htmlSnippet;
             }
          }
          // Restore buttons for files that failed or were missing from the AI response
          for (const fileId of fileIds) {
             if (!results[fileId] && originalBtns[fileId] && listItems[fileId]) {
                const spinnerBtn = listItems[fileId].querySelector(`button[data-spinner-for="${fileId}"]`);
                if (spinnerBtn) spinnerBtn.outerHTML = originalBtns[fileId];
             }
          }
        } else {
          console.error('Failed to batch rename files');
          alert('Toplu isimlendirme sırasında hata oluştu.');
          // Restore all buttons
          for (const fileId of fileIds) {
             if (originalBtns[fileId] && listItems[fileId]) {
                const spinnerBtn = listItems[fileId].querySelector(`button[data-spinner-for="${fileId}"]`);
                if (spinnerBtn) spinnerBtn.outerHTML = originalBtns[fileId];
             }
          }
        }
      } catch (e) {
        console.error('Error during batch rename', e);
        alert('Toplu isimlendirme sırasında hata oluştu.');
        for (const fileId of fileIds) {
           if (originalBtns[fileId] && listItems[fileId]) {
              const spinnerBtn = listItems[fileId].querySelector(`button[data-spinner-for="${fileId}"]`);
              if (spinnerBtn) spinnerBtn.outerHTML = originalBtns[fileId];
           }
        }
      }
    }

    function downloadSingleFile(fileId, btn) {
      const listItems = Array.from(document.querySelectorAll('#output-list li'));
      const li = btn.closest('li');
      let count = 0;
      let index = 1;
      for (let i = 0; i < listItems.length; i++) {
         if (listItems[i].id === 'output-empty') continue;
         count++;
         if (listItems[i] === li) {
            index = count;
            break;
         }
      }
      window.location.href = `/download/${fileId}?ek_no=${index}`;
    }

    let currentPreviewZoom = 1;
    let currentTranslateX = 0;
    let currentTranslateY = 0;
    let isDraggingPreview = false;
    let dragStartX = 0;
    let dragStartY = 0;

    function zoomPreview(delta) {
        currentPreviewZoom += delta;
        if (currentPreviewZoom < 0.2) currentPreviewZoom = 0.2;
        if (currentPreviewZoom > 5) currentPreviewZoom = 5;
        applyPreviewZoom();
    }
    function resetZoom(fullView = false) {
        currentTranslateX = 0;
        currentTranslateY = 0;
        
        if (fullView) {
            const container = document.getElementById('preview-scroll-container');
            const img = document.getElementById('naming-preview-img');
            if (container && img && img.clientHeight > 0) {
                currentPreviewZoom = container.clientHeight / img.clientHeight;
                if (currentPreviewZoom < 0.2) currentPreviewZoom = 0.2;
            } else {
                currentPreviewZoom = 0.4;
            }
        } else {
            currentPreviewZoom = 1.4;
        }
        applyPreviewZoom();
    }
    function applyPreviewZoom() {
        const img = document.getElementById('naming-preview-img');
        if (img) {
            let rotationStr = "";
            if (img.dataset.rotation) {
                rotationStr = `rotate(${img.dataset.rotation}deg)`;
            }
            // Applying translate first (leftmost) means translation is in unscaled screen coordinates
            img.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentPreviewZoom}) ${rotationStr}`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('preview-scroll-container');
        if (container) {
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    zoomPreview(0.1);
                } else {
                    zoomPreview(-0.1);
                }
            });

            container.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // Only left click
                e.preventDefault(); // Prevent browser from shifting focus
                
                // Explicitly keep/set focus on the filename input
                const filenameInput = document.getElementById('custom-filename');
                if (filenameInput) filenameInput.focus();

                isDraggingPreview = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                container.classList.add('cursor-grabbing');
                container.classList.remove('cursor-move');
            });
            
            window.addEventListener('mouseup', () => {
                isDraggingPreview = false;
                if (container) {
                    container.classList.remove('cursor-grabbing');
                    container.classList.add('cursor-move');
                }
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isDraggingPreview) return;
                e.preventDefault();
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                
                currentTranslateX += dx;
                currentTranslateY += dy;
                applyPreviewZoom();
            });
        }
    });
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('custom-filename');
        if (input) {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    proceedToExtract(); // Submit when hitting enter
                }
            });
        }

        const viewerArea = document.getElementById('viewer');
        if (viewerArea) {
            viewerArea.addEventListener('mousedown', (e) => {
                // Check if click is on the scrollbar
                const isScrollbar = e.offsetX > e.target.clientWidth || e.offsetY > e.target.clientHeight;
                if (!isScrollbar) {
                    const inp = document.getElementById('batch-name-input');
                    // Avoid preventing default on inputs to allow normal text selection.
                    // Also skip page-card clicks entirely: forcing focus back onto the batch
                    // name field on every click there permanently pins document.activeElement
                    // to an <input>, which silently disables the Ctrl+Z/Ctrl+X page shortcuts.
                    if (inp && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && !e.target.closest('.page-card')) {
                        e.preventDefault();
                        inp.focus();
                    }
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            const isCtrl = e.ctrlKey || e.metaKey;
            const activeEl = document.activeElement;
            const isInput = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.isContentEditable);

            if (isCtrl && (e.key === 'z' || e.key === 'Z')) {
                if (isInput) return; // Let default browser undo work inside inputs
                e.preventDefault();
                undoLastSelection();
            }
            
            if (isCtrl && (e.key === 'x' || e.key === 'X')) {
                if (isInput) return; // Let default browser cut work inside inputs
                e.preventDefault();
                doExtract();
            }

            if (e.altKey && e.key === 'ArrowLeft') {
                const isModalOpen = document.getElementById('naming-modal')?.classList.contains('active');
                if (isModalOpen) {
                    e.preventDefault();
                    previewPrevPage();
                } else if (isBatchMode) {
                    e.preventDefault();
                    if (isInput) activeEl.blur(); // Trigger onchange if renaming
                    prevBatch();
                }
            }
            if (e.altKey && e.key === 'ArrowRight') {
                const isModalOpen = document.getElementById('naming-modal')?.classList.contains('active');
                if (isModalOpen) {
                    e.preventDefault();
                    previewNextPage();
                } else if (isBatchMode) {
                    e.preventDefault();
                    if (isInput) activeEl.blur(); // Trigger onchange if renaming
                    nextBatch();
                }
            }

            if (e.altKey && e.key === 'ArrowUp') {
                const isModalOpen = document.getElementById('naming-modal')?.classList.contains('active');
                if (isModalOpen) {
                    e.preventDefault();
                    previewPrevBatch();
                }
            }
            if (e.altKey && e.key === 'ArrowDown') {
                const isModalOpen = document.getElementById('naming-modal')?.classList.contains('active');
                if (isModalOpen) {
                    e.preventDefault();
                    previewNextBatch();
                }
            }
        });
    });

    function undoLastSelection() {
        if (selectionHistory.length === 0) return;
        const lastAction = selectionHistory.pop();
        
        lastAction.added.forEach(id => selectedPages.delete(id));
        lastAction.removed.forEach(id => selectedPages.add(id));
        lastClickedCardId = lastAction.prevAnchor;
        
        updateHighlight();
        updateSelectionInfo();
    }

    // BATCH MODE LOGIC
    function toggleBatchMode() {
        isBatchMode = !isBatchMode;
        const btn = document.getElementById('btn-batch-mode');
        const uploadSection = document.getElementById('drop-zone');
        const uploadStatus = document.getElementById('upload-status');
        const batchNavUI = document.getElementById('batch-nav-ui');

        document.body.classList.remove('sidebar-open'); // reveal the grid on mobile after toggling from the drawer

        if (isBatchMode) {
            btn.classList.add('text-white', 'bg-blue-600', 'border-blue-500');
            btn.classList.remove('text-gray-400', 'bg-gray-800');
            
            // Backup current viewer state
            const firstCard = document.querySelector('.page-card');
            if (firstCard && firstCard.dataset.pdfId) {
                // If it's a batch, we might overwrite originalPdfId. Wait, if it's already in batch mode?
                // No, we are entering batch mode here, so the grid currently holds the original upload.
                originalPdfId = firstCard.dataset.pdfId;
            }
            // For page count and filename, we assume they are handled by backend or we can just fetch original again.
            // Actually, we can just load the first batch if any exist.
            uploadSection.classList.add('hidden');
            uploadStatus.classList.add('hidden');
            batchNavUI.classList.remove('hidden');
            
            const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
            if (listItems.length > 0) {
                currentBatchIndex = 0;
                loadBatch(currentBatchIndex);
            } else {
                showStatus('Önizlenecek grup yok', 'text-yellow-400');
                toggleBatchMode(); // revert
            }
            // Auto focus input when entering batch mode
            setTimeout(() => document.getElementById('batch-name-input').focus(), 50);
        } else {
            btn.classList.remove('text-white', 'bg-blue-600', 'border-blue-500');
            btn.classList.add('text-gray-400', 'bg-gray-800');
            
            uploadSection.classList.remove('hidden');
            uploadStatus.classList.remove('hidden');
            batchNavUI.classList.add('hidden');
            
            currentBatchIndex = -1;
            
            // Restore original upload if exists
            if (originalPdfId) {
                // To restore the grid, we need the viewer.html endpoint for the original pdf.
                // For now, if originalPdfId exists, we can re-fetch it from a new endpoint `GET /batch_viewer/{pdf_id}`
                // since it's the same logic!
                fetchAndRenderBatch(originalPdfId, 'Original Upload');
            } else {
                // Clear grid
                document.getElementById('viewer').innerHTML = `
                    <div id="upload-hint" class="flex flex-col items-center justify-center h-full gap-4 text-gray-600">
                      <svg class="w-20 h-20" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                      <p class="text-lg">Aşağıdan bir PDF yükleyin</p>
                    </div>`;
                document.getElementById('toolbar').classList.add('hidden');
            }
        }
    }

    function prevBatch() {
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (listItems.length === 0) return;
        currentBatchIndex--;
        if (currentBatchIndex < 0) currentBatchIndex = listItems.length - 1;
        loadBatch(currentBatchIndex);
    }

    function nextBatch() {
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (listItems.length === 0) return;
        currentBatchIndex++;
        if (currentBatchIndex >= listItems.length) currentBatchIndex = 0;
        loadBatch(currentBatchIndex);
    }

    function loadBatch(index) {
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (index < 0 || index >= listItems.length) return;
        
        const fileId = listItems[index].dataset.fileId;
        const filenameEl = listItems[index].closest('li').querySelector('p.truncate');
        const filename = filenameEl ? filenameEl.textContent : 'Grup';
        
        document.getElementById('batch-nav-status').textContent = `${index + 1} / ${listItems.length}`;
        document.getElementById('batch-name-input').value = filename.replace(/\.pdf$/i, '');
        
        // Highlight active batch in left panel
        document.querySelectorAll('#output-list li').forEach(li => li.classList.remove('bg-gray-800'));
        listItems[index].closest('li').classList.add('bg-gray-800');
        
        fetchAndRenderBatch(fileId, filename);
        
        // Auto focus input when switching batches
        setTimeout(() => document.getElementById('batch-name-input').focus(), 50);
    }

    // Keeps currentBatchIndex and the "X / Y" nav counter correct after the output list
    // changes shape without a batch-nav action causing it (e.g. deleting an item). The
    // batch actually being viewed is identified by its file_id (read off the page-cards
    // currently in the grid), not by position, since deleting an earlier item shifts
    // everyone after it down by one.
    function refreshBatchNavStatus() {
        if (!isBatchMode) return;

        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        const total = listItems.length;
        const viewedFileId = document.querySelector('.page-card')?.dataset.pdfId;
        const newIndex = viewedFileId
            ? Array.from(listItems).findIndex(btn => btn.dataset.fileId === viewedFileId)
            : -1;

        if (newIndex === -1) {
            // The batch we were viewing was itself the one just removed.
            if (total > 0) {
                loadBatch(Math.min(currentBatchIndex, total - 1));
            } else {
                toggleBatchMode(); // no batches left; fall back out of batch mode
            }
            return;
        }

        currentBatchIndex = newIndex;
        const statusEl = document.getElementById('batch-nav-status');
        if (statusEl) statusEl.textContent = `${newIndex + 1} / ${total}`;
    }

    async function fetchAndRenderBatch(fileId, filename) {
        try {
            const res = await fetch('/batch_viewer/' + fileId);
            if (!res.ok) throw new Error('Failed to load batch view');
            
            // Reusing HTMX logic by manually processing the response or just injecting HTML
            // The endpoint should return partials/viewer.html
            const html = await res.text();
            
            // Extract the HX-Trigger headers to trigger viewerReady manually
            const pageCountMatch = html.match(/data-page-count="(\d+)"/);
            const pdfIdMatch = html.match(/data-pdf-id="([^"]+)"/);
            
            const viewerContainer = document.getElementById('viewer');
            viewerContainer.innerHTML = html; // inject into viewer container

            // Chromium reuses an already-decoded image for an identical URL from its
            // in-memory image cache regardless of Cache-Control, so after a Batch Mode
            // Update rewrites this same pdf_id's page content, a freshly-injected <img>
            // pointing at the same "/page/{pdf_id}/{i}" URL would silently show the OLD
            // bitmap. A cache-busting query param forces a real re-fetch every load.
            const cacheBust = Date.now();
            viewerContainer.querySelectorAll('.page-img').forEach(img => {
                img.src = img.src + (img.src.includes('?') ? '&' : '?') + 'v=' + cacheBust;
            });

            initSortable(); // #viewer-inner was just replaced, so the old Sortable instance is stale
            reconcileExtractedState(); // ...and so is any extracted-page hiding; the fresh HTML has none applied

            // Manually re-trigger viewerReady
            if (pageCountMatch && pdfIdMatch) {
                document.body.dispatchEvent(new CustomEvent('viewerReady', {
                    detail: {
                        pdfId: pdfIdMatch[1],
                        pageCount: parseInt(pageCountMatch[1])
                    }
                }));
            }
        } catch (e) {
            console.error(e);
            showStatus('Grup ızgarası yüklenirken hata oluştu', 'text-red-400');
        }
    }

    function renameActiveBatch(newName) {
        if (!isBatchMode || currentBatchIndex < 0) return;
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (listItems.length === 0) return;
        const fileId = listItems[currentBatchIndex].dataset.fileId;
        submitRename(fileId, newName);
    }

    // Persists the active batch's current grid state (rotation/deletion/reorder) —
    // the only edit type that isn't already auto-saved via renameActiveBatch — back
    // to the server, rewriting that same file_id's PDF in place.
    // Reads the current grid's page order/rotation, excluding deleted cards and any
    // cards already sent to another batch (.extracted-page — see persistBatchExtractionCut)
    // and, optionally, a caller-supplied set of cards to leave out too.
    function gatherCurrentGridPages(excludeCardEls = []) {
        const excludeSet = new Set(excludeCardEls);
        return Array.from(document.querySelectorAll('.page-card'))
            .filter(card => !excludeSet.has(card) && !deletedPages.has(card.id) && !card.classList.contains('extracted-page'))
            .map(card => ({
                pdf_id: card.dataset.pdfId,
                page_idx: parseInt(card.dataset.pageIndex),
                rotation: pageRotations[card.id] || 0
            }));
    }

    // POSTs the given page list to /update/{fileId}, refreshes that output-list row,
    // and clears out now-stale per-page bookkeeping for fileId. Returns whether it
    // succeeded; the caller decides whether/when to reload the grid.
    async function persistPagesToBatch(fileId, pages) {
        const res = await postAction('/update/' + fileId, { pages });
        if (!res) return false;

        const link = document.querySelector(`.download-btn[data-file-id='${fileId}']`);
        const li = link ? link.closest('li') : null;
        if (li) li.innerHTML = res;

        // Scoped clear: only THIS file_id's card-keyed state is stale (indices were
        // just renumbered). Other batches may have their own unsaved pending edits —
        // do not touch those.
        const prefix = `page-card-${fileId}-`;
        Object.keys(pageRotations).forEach(k => { if (k.startsWith(prefix)) delete pageRotations[k]; });
        Array.from(deletedPages).forEach(k => { if (k.startsWith(prefix)) deletedPages.delete(k); });

        // extractedPageIndices[fileId] refers to pre-persist page numbering, and once
        // extraction is a real cut (see persistBatchExtractionCut) there is no more
        // "restore into the source" meaning for it anyway — drop it.
        delete extractedPageIndices[fileId];

        return true;
    }

    async function updateActiveBatch() {
        if (!isBatchMode || currentBatchIndex < 0) return;
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (listItems.length === 0) return;
        const fileId = listItems[currentBatchIndex].dataset.fileId;

        const pages = gatherCurrentGridPages();
        if (pages.length === 0) {
            // Nothing left to keep — a 0-page batch isn't a meaningful thing to save,
            // so treat "delete every page, then Update" as "remove this batch".
            removeOutputByFileId(fileId);
            showStatus('✓ Grup kaldırıldı — tüm sayfaları silinmişti.', 'text-green-400');
            return;
        }

        if (await persistPagesToBatch(fileId, pages)) {
            loadBatch(currentBatchIndex); // refetch fresh grid: new order/count, rotations reset, thumbnails regenerated server-side
        }
    }

    // Extracting pages while viewing a batch in Batch Mode is a cut, not a copy: the
    // extracted pages must actually leave the source batch's file on the server, or
    // the same pages could be re-extracted into unlimited further batches and — since
    // updateActiveBatch() didn't used to exclude them either — clicking Update later
    // would silently write them back into the source, undoing the extraction.
    async function persistBatchExtractionCut(extractedCardEls) {
        if (!isBatchMode || currentBatchIndex < 0) return;
        const listItems = document.querySelectorAll('#output-list li:not(#output-empty) .download-btn');
        if (listItems.length === 0) return;
        const sourceFileId = listItems[currentBatchIndex].dataset.fileId;

        const remainingPages = gatherCurrentGridPages(extractedCardEls);
        if (remainingPages.length === 0) {
            // Extracting every remaining page leaves nothing behind — a 0-page batch
            // isn't meaningful, so remove the now-fully-consumed source outright
            // instead of leaving a stale, endlessly re-extractable duplicate around.
            removeOutputByFileId(sourceFileId);
            showStatus('✓ Grup tamamen ayıklandı ve kaldırıldı.', 'text-green-400');
            return;
        }

        if (await persistPagesToBatch(sourceFileId, remainingPages)) {
            loadBatch(currentBatchIndex);
        }
    }
  </script>
</body>
